<svg width="400" height="400" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" class="mx-auto">
	<defs>
		<rect id="gardenBG" width="300" height="300" fill="#fdfdf2" />
		
		<linearGradient id="deepStone" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color: #064e3b; stop-opacity: 1;"></stop> <stop offset="100%" style="stop-color: #083344; stop-opacity: 1;"></stop> </linearGradient>

		<linearGradient id="sunGlow" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" style="stop-color: #fbbf24; stop-opacity: 1;"></stop>
			<stop offset="50%" style="stop-color: #fde047; stop-opacity: 1;"></stop>
			<stop offset="100%" style="stop-color: #fbbf24; stop-opacity: 1;"></stop>
		</linearGradient>

		<linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color: #22d3ee; stop-opacity: 0.6;"></stop>
			<stop offset="100%" style="stop-color: #10b981; stop-opacity: 0.6;"></stop>
		</linearGradient>
	</defs>

	<use href="#gardenBG" />

	<path d="M 70 260 L 70 120 Q 70 40, 150 40 Q 230 40, 230 120 L 230 260" stroke="url(#deepStone)" stroke-width="18" fill="none" stroke-linecap="round"></path>
	<path d="M 85 255 L 85 125 Q 85 60, 150 60 Q 215 60, 215 125 L 215 255" stroke="url(#deepStone)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"></path>

	<g opacity="0.7">
		<path d="M 70 180 Q 40 170, 45 140" stroke="url(#leafGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
		<path d="M 230 180 Q 260 170, 255 140" stroke="url(#leafGrad)" stroke-width="3" fill="none" stroke-linecap="round" />
		<path d="M 150 40 Q 150 10, 180 15" stroke="url(#leafGrad)" stroke-width="2" fill="none" stroke-linecap="round" />
	</g>

	<ellipse cx="45" cy="140" rx="6" ry="10" fill="#22d3ee" transform="rotate(-30 45 140)" />
	<ellipse cx="255" cy="140" rx="6" ry="10" fill="#22d3ee" transform="rotate(30 255 140)" />
	<ellipse cx="180" cy="15" rx="4" ry="7" fill="#10b981" transform="rotate(45 180 15)" />

	<circle cx="150" cy="180" r="25" stroke="url(#deepStone)" stroke-width="3" fill="#fff" />
	<circle cx="150" cy="180" r="18" fill="url(#sunGlow)" opacity="0.3" />

	<g transform="translate(150, 180) scale(0.6)">
		<path d="M 0 -20 L 18 12 L -18 12 Z" fill="#083344" stroke="#fbbf24" stroke-width="2" />
		<circle cx="0" cy="-20" r="4" fill="#fbbf24" />
	</g>

	<circle cx="45" cy="140" r="2.5" fill="#fbbf24" />
	<circle cx="255" cy="140" r="2.5" fill="#fbbf24" />
	<circle cx="70" cy="260" r="5" fill="#fbbf24" />
	<circle cx="230" cy="260" r="5" fill="#fbbf24" />
</svg>