<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <rect id="secretGarden" width="400" height="400" fill="#fcfcf0" />

        <linearGradient id="natureBurst" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #3b82f6; stop-opacity: 1;" /> <stop offset="50%" style="stop-color: #10b981; stop-opacity: 0.9;" /> <stop offset="100%" style="stop-color: #fffbeb; stop-opacity: 0.8;" /> </linearGradient>

        <linearGradient id="atriumStone" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" style="stop-color: #3f6212; stop-opacity: 1;" /> <stop offset="100%" style="stop-color: #171717; stop-opacity: 1;" /> </linearGradient>

        <mask id="engraveMask">
            <path d="M 70 350 L 70 140 Q 70 40, 200 40 Q 330 40, 330 140 L 330 350" fill="white" />
            
            <g transform="translate(100, 150) rotate(-20) scale(0.8)">
                <path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
            </g>
            <g transform="translate(200, 90) rotate(10) scale(0.7)">
                <path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
            </g>
            <g transform="translate(300, 150) rotate(25) scale(0.8)">
                <path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
            </g>
        </mask>
        
        <filter id="naturalGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <use href="#secretGarden" />

    <g filter="url(#naturalGlow)">
        <path d="M 70 350 L 70 140 Q 70 40, 200 40 Q 330 40, 330 140 L 330 350" fill="url(#natureBurst)" opacity="0.9" />
    </g>

    <path d="M 70 350 L 70 140 Q 70 40, 200 40 Q 330 40, 330 140 L 330 350" 
          fill="url(#atriumStone)" 
          mask="url(#engraveMask)" 
          stroke="#eab308" 
          stroke-width="1.2" 
          stroke-linecap="round" />

    <g filter="url(#naturalGlow)" opacity="0.7">
        <path d="M 110 160 Q 150 130, 190 100" stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-dasharray="2 4" /> <path d="M 210 100 Q 250 130, 290 160" stroke="#fef08a" stroke-width="1.5" fill="none" stroke-dasharray="2 4" /> </g>

    <g filter="url(#naturalGlow)">
        <circle cx="70" cy="350" r="6" fill="#fbbf24" /> <circle cx="330" cy="350" r="6" fill="#fbbf24" />
        
        <circle cx="150" cy="220" r="4" fill="#67e8f9" /> <circle cx="250" cy="220" r="4" fill="#fb7185" /> <circle cx="200" cy="280" r="5" fill="#facc15" /> </g>

    <g transform="translate(200, 220) scale(1.1)" filter="url(#naturalGlow)">
        <path d="M 0 -15 L 15 10 L -15 10 Z" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
        <circle cx="0" cy="-15" r="3" fill="#fbbf24" />
    </g>
</svg>