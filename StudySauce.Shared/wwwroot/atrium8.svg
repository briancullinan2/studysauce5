<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" class="mx-auto">
	<defs>
		<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color: rgb(30, 58, 95); stop-opacity: 1;"></stop>
			<stop offset="100%" style="stop-color: rgb(6, 182, 212); stop-opacity: 1;"></stop>
		</linearGradient>
		<linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color: rgb(12, 74, 110); stop-opacity: 1;"></stop>
			<stop offset="100%" style="stop-color: rgb(34, 211, 238); stop-opacity: 1;"></stop>
		</linearGradient>
		<linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" style="stop-color: rgb(251, 191, 36); stop-opacity: 1;"></stop>
			<stop offset="100%" style="stop-color: rgb(251, 191, 36); stop-opacity: 1;"></stop>
		</linearGradient>
		<linearGradient id="natureBurst" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color: #3b82f6; stop-opacity: 1;" /> 
			<stop offset="50%" style="stop-color: #10b981; stop-opacity: 0.9;" /> 
			<stop offset="100%" style="stop-color: #fffbeb; stop-opacity: 0.8;" /> 
		</linearGradient>
		<linearGradient id="atriumStone" x1="50%" y1="0%" x2="50%" y2="100%">
			<stop offset="0%" style="stop-color: #3f6212; stop-opacity: 1;" /> 
			<stop offset="100%" style="stop-color: #171717; stop-opacity: 1;" /> 
		</linearGradient>
		<linearGradient id="sunGlow" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" style="stop-color: #fbbf24; stop-opacity: 1;"></stop>
			<stop offset="100%" style="stop-color: #fbbf24; stop-opacity: 1;"></stop>
		</linearGradient>

		<filter id="naturalGlow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="2.5" result="blur" />
			<feComposite in="SourceGraphic" in2="blur" operator="over" />
		</filter>
		<mask id="engraveMask">
			<path d="M 70 350 L 70 140 Q 70 40, 200 40 Q 330 40, 330 140 L 330 350" fill="white" />
			<g transform="translate(100, 150) rotate(-20) scale(0.8)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
			</g>
			<g transform="translate(200, 90) rotate(10) scale(0.7)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
			</g>
			<g transform="translate(300, 150) rotate(25) scale(0.8)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="black" />
			</g>
		</mask>
				<radialGradient id="natureBurstPulse" cx="50%" cy="50%" r="50%">
			<stop offset="0%" style="stop-color: #3b82f6; stop-opacity: 1;" /> <stop offset="60%" style="stop-color: #10b981; stop-opacity: 0.9;" /> <stop offset="100%" style="stop-color: #fbbf24; stop-opacity: 0.8;" /> </radialGradient>

		<linearGradient id="anchorGold" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" style="stop-color: #fbbf24; stop-opacity: 1;" />
			<stop offset="50%" style="stop-color: #fde047; stop-opacity: 1;" />
			<stop offset="100%" style="stop-color: #fbbf24; stop-opacity: 1;" />
		</linearGradient>

		<mask id="birdSignatureMask">
			<g transform="translate(100, 150) rotate(-20) scale(0.8)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="white" />
			</g>
			<g transform="translate(200, 90) rotate(10) scale(0.7)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="white" />
			</g>
			<g transform="translate(300, 150) rotate(25) scale(0.8)">
				<path d="M 0 -20 L 20 15 L -20 15 Z" fill="white" />
			</g>
		</mask>
		
		<filter id="naturalGlow" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="2.5" result="blur" />
			<feComposite in="SourceGraphic" in2="blur" operator="over" />
		</filter>

	</defs>

	<g filter="url(#naturalGlow)" opacity="0.6">
		<path d="M 110 160 Q 150 130, 190 100" stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-dasharray="4 2" />
		<path d="M 210 100 Q 250 130, 290 160" stroke="#fef08a" stroke-width="1.5" fill="none" stroke-dasharray="4 2" />
		<path d="M 150 250 L 105 270 M 150 270 L 100 305 M 250 270 L 300 305" stroke="#67e8f9" stroke-width="1" stroke-dasharray="2 2" />
	</g>

	<g transform="translate(200, 205) scale(0.7)">
		<path d="M 0 -25 L 22 15 L -22 15 Z" fill="url(#grad1)" stroke="url(#grad2)" stroke-width="2"></path>
		<circle cx="-22" cy="15" r="3" fill="#fbbf24"></circle> 
		<circle cx="22" cy="15" r="3" fill="#fbbf24"></circle>
		<circle cx="0" cy="-25" r="4" fill="#fbbf24"></circle>
	</g>

	<g filter="url(#naturalGlow)">
		<circle cx="70" cy="350" r="6" fill="#fbbf24" /> 
		<circle cx="330" cy="350" r="6" fill="#fbbf24" />
		<circle cx="150" cy="220" r="4" fill="#67e8f9" /> 
		<circle cx="250" cy="220" r="4" fill="#fb7185" /> 
		<circle cx="200" cy="280" r="5" fill="#facc15" /> 
	</g>

	<g transform="translate(260, 280) scale(0.9) rotate(15)" filter="url(#naturalGlow)">
		<path d="M 0 -15 L 15 10 L -15 10 Z" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
		<circle cx="0" cy="-15" r="3" fill="#fbbf24" />
	</g>
	<g transform="translate(0, 0)">
		<rect width="400" height="400" fill="url(#natureBurstPulse)" mask="url(#birdSignatureMask)" />
	</g>

	<g filter="url(#naturalGlow)">
		<circle cx="70" cy="350" r="6" fill="#fbbf24" filter="blur(1px)"></circle> 
		<circle cx="330" cy="350" r="6" fill="#fbbf24" filter="blur(1px)"></circle>
		
		<circle cx="150" cy="220" r="4" fill="#67e8f9" filter="blur(1px)"></circle> 
		<circle cx="250" cy="220" r="4" fill="#fb7185" filter="blur(1px)"></circle> 
		<circle cx="200" cy="280" r="5" fill="#facc15" filter="blur(1px)"></circle> 
	</g>
</svg>